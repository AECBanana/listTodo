name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════
  #  版本号 — 日期格式 YYYY.MMDD.BUILD
  # ═══════════════════════════════════════════
  version:
    name: Generate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: ver
        run: |
          # 生成 YYYY.MMDD.BUILD（Cargo 只支持三段 semver）
          Y=$(date -u +%Y)
          MD=$(date -u +%-m%-d)
          BASE="${Y}.${MD}"

          # 查找当天已有的 tag 数量作为 BUILD 号
          TODAY_TAGS=$(git tag -l "v${Y}.${MD}.*" | wc -l)
          BUILD=$TODAY_TAGS

          VERSION="${BASE}.${BUILD}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"

      - name: Write version to files
        run: |
          V="${{ steps.ver.outputs.version }}"

          # frontend/package.json
          jq --arg v "$V" '.version = $v' frontend/package.json > tmp.json && mv tmp.json frontend/package.json

          # src-tauri/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$V\"/" src-tauri/Cargo.toml

          # backend/Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$V\"/" backend/Cargo.toml

          # tauri.conf.json
          jq --arg v "$V" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Upload patched files
        uses: actions/upload-artifact@v4
        with:
          name: patched-sources
          path: |
            frontend/package.json
            src-tauri/Cargo.toml
            backend/Cargo.toml
            src-tauri/tauri.conf.json
          retention-days: 1

  # ═══════════════════════════════════════════
  #  桌面端 — Windows / macOS / Linux
  # ═══════════════════════════════════════════
  tauri:
    name: Tauri (${{ matrix.target }})
    needs: [version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: msi
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: dmg
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: patched-sources

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri
        run: |
          npm install -g @tauri-apps/cli
          tauri build
        working-directory: src-tauri
        env:
          VITE_API_BASE: ${{ secrets.API_URL }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            target/release/rinotodo-tauri
            target/release/rinotodo-tauri.exe

  # ═══════════════════════════════════════════
  #  后端 — Linux 二进制
  # ═══════════════════════════════════════════
  backend:
    name: Backend (Linux x86_64)
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: patched-sources

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build -p backend --release

      - name: Package
        run: |
          mkdir -p release
          cp target/release/backend release/rinotodo-server
          cp -r backend/migrations release/migrations
          cp backend/.env.example release/.env.example
          tar -czf rinotodo-server-linux-x86_64.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-x86_64
          path: rinotodo-server-linux-x86_64.tar.gz

  # ═══════════════════════════════════════════
  #  前端 — 静态 Web 应用
  # ═══════════════════════════════════════════
  frontend:
    name: Frontend (Web)
    needs: [version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: patched-sources

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        env:
          VITE_API_BASE: ${{ secrets.API_URL }}
        run: |
          npm ci
          npm run build
        working-directory: frontend

      - name: Package
        run: |
          cd frontend/dist
          zip -r ../../rinotodo-web.zip .

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: frontend/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/' }}
          dangerous-clean-slate: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: rinotodo-web.zip

  # ═══════════════════════════════════════════
  #  汇总 — 创建 Release + 所有产物
  # ═══════════════════════════════════════════
  release:
    name: Create Release
    needs: [tauri, backend, frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Remove patched sources
        run: rm -rf assets/patched-sources

      - name: Create Release & Upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Files in assets ==="
          find assets -type f || echo "NO FILES FOUND"

          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "RinoTodo ${{ github.ref_name }}" \
            --notes "见 [CHANGELOG.md](./CHANGELOG.md)" \
            ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') && '--prerelease' || '' }}

          find assets -mindepth 2 -type f | while read f; do
            echo "Uploading $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
